name: DrumPadCoach
options:
  bundleIdPrefix: com.drumcoach
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

targets:
  DrumPadCoach:
    type: application
    platform: iOS
    sources: [DrumPadCoach]
    settings:
      base:
        INFOPLIST_FILE: DrumPadCoach/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.drumcoach.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: false
        SWIFT_VERSION: "5.9"
    info:
      path: DrumPadCoach/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: DrumPad Coach
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_TYPE)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "需要使用麦克风录制您的鼓击声音进行分析"
        UIRequiredDeviceCapabilities:
          - armv7
