name: Build iOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix line endings
        run: |
          git config --global core.autocrlf false
          find . -name '*.swift' -exec sed -i '' 's/\r$//' {} +
          find . -name '*.plist' -exec sed -i '' 's/\r$//' {} +
          find . -name '*.yml' -exec sed -i '' 's/\r$//' {} +

      - name: Check file encodings
        run: |
          echo "=== File type for all Swift files ==="
          find . -name '*.swift' -exec file {} \;
          echo ""
          echo "=== cat -v MetronomeView.swift (first 30 lines) ==="
          cat -v DrumPadCoach/Features/Metronome/MetronomeView.swift | head -30
          echo ""
          echo "=== Hex dump around line 4 ==="
          head -5 DrumPadCoach/Features/Metronome/MetronomeView.swift | xxd | head -20

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Show Swift version
        run: swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build for Simulator
        run: |
          xcodebuild build \
            -project DrumPadCoach.xcodeproj \
            -scheme DrumPadCoach \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            2>&1 | tee build_output.log
        continue-on-error: true

      - name: Show build errors
        if: always()
        run: |
          echo "=== Filtering errors from build output ==="
          grep -i "error:" build_output.log || echo "No errors found"
          echo ""
          echo "=== Full build output (last 200 lines) ==="
          tail -200 build_output.log

      - name: Build Archive (unsigned)
        run: |
          xcodebuild archive \
            -project DrumPadCoach.xcodeproj \
            -scheme DrumPadCoach \
            -archivePath build/DrumPadCoach.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            -quiet

      - name: Extract .app from archive
        run: |
          mkdir -p build/ipa
          cp -r build/DrumPadCoach.xcarchive/Products/Applications/DrumPadCoach.app build/ipa/

      - name: Upload unsigned app
        uses: actions/upload-artifact@v4
        with:
          name: DrumPadCoach-unsigned
          path: build/ipa/DrumPadCoach.app
          retention-days: 30

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: DrumPadCoach-xcarchive
          path: build/DrumPadCoach.xcarchive
          retention-days: 30
